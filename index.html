<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Writing Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#2563eb', hover: '#1d4ed8', light: '#dbeafe' },
            secondary: '#64748b',
            muted: '#6b7280',
            'muted-bg': '#f3f4f6',
            sidebar: '#f8fafc',
            'sidebar-border': '#e2e8f0',
            card: '#ffffff',
            'card-border': '#e5e7eb',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    /* Inline SVG icons */
    .icon { display: inline-block; width: 1em; height: 1em; vertical-align: middle; }
  </style>
</head>
<body class="bg-white text-gray-900">
  <div id="app"></div>
  <script>
    // ============ ICONS (inline SVG) ============
    const ICONS = {

      'quote': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>',

      'file-text': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>',

      'chevron-left': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
      'chevron-right': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',
      'chevron-down': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
      'chevron-up': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>',
      'alert-circle': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>',
      'lightbulb': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>',
      'copy': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>',
      'trash-2': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>',
      'plus': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>',
      'arrow-right': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>',
      'download': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>',
      'save': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>',
      'key': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>',
      'building': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>',
      'sparkles': '<svg xmlns="http://www.w3.org/2000/svg" width="SIZE" height="SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>',
    };

    function icon(name, size) {
      var s = size || 20;
      return (ICONS[name] || '').replace(/SIZE/g, String(s));
    }

    // ============ STATE ============
    var state = {
      activeTool: 'dashboard',
      sidebarCollapsed: false,
      apiKey: localStorage.getItem('awa-api-key') || '',
      citationStyle: localStorage.getItem('awa-citation') || 'apa',
      writingText: '',
      writingContext: 'academic',
      suggestions: [],
      writingLoading: false,
      selectedSuggestion: null,
      writingError: '',
      citationTab: 'generator',
      citationSource: '',
      citationStyleSelect: 'apa',
      citationLoading: false,
      citationError: '',
      lastCitation: null,
      bibliography: JSON.parse(localStorage.getItem('awa-biblio') || '[]'),
      proofText: '',
      corrections: [],
      proofScore: 0,
      correctedText: '',
      proofLoading: false,
      proofError: '',
      selectedCorrection: null,
      thesisStep: 'setup',
      thesisTopic: '',
      thesisDegree: '',
      thesisDept: '',
      thesisLoading: false,
      thesisError: '',
      thesisSections: [],
      thesisTotalWords: 0,
      currentGenSection: null,
      showApiKey: false,
      settingsSaved: false,
    };

    var CITATION_STYLES = {
      apa: { name: 'APA 7th Edition', inText: '(Author, Year)' },
      mla: { name: 'MLA 9th Edition', inText: '(Author Page)' },
      chicago: { name: 'Chicago 17th', inText: '(Author Year, Page)' },
      harvard: { name: 'Harvard', inText: '(Author, Year)' },
      ieee: { name: 'IEEE', inText: '[1]' },
      oxford: { name: 'Oxford', inText: 'Footnote' },
      vancouver: { name: 'Vancouver', inText: '(1)' },
    };

    // ============ API FUNCTIONS ============
    function callOpenAI(messages, opts) {
      opts = opts || {};
      return fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + state.apiKey },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: messages,
          temperature: opts.temperature || 0.3,
          max_tokens: opts.max_tokens || 4000,
          response_format: opts.json ? { type: 'json_object' } : undefined,
        })
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(e) { throw new Error(e.error.message || 'API error'); });
        return r.json();
      }).then(function(d) { return d.choices[0].message.content; });
    }

    function analyzeWriting(text, ctx) {
      return callOpenAI([{ role: 'user', content:
        'You are an academic writing tutor. Analyze this ' + ctx + ' writing. Return JSON only.\n\n' +
        'Text:\n"""\n' + text + '\n"""\n\n' +
        'Return: { "suggestions": [{"id":"1","original":"snippet","suggestion":"improved","explanation":"why better","type":"clarity|structure|tone|vocabulary|flow","severity":"low|medium|high"}] }\n' +
        'Max 15 suggestions.'
      }], { json: true }).then(function(c) {
        try { return JSON.parse(c).suggestions || []; } catch(e) { return []; }
      });
    }

    function proofreadText(text) {
      return callOpenAI([{ role: 'user', content:
        'Proofread this academic text. Return JSON only:\n' +
        '{ "corrections": [{"original":"","corrected":"","type":"grammar|spelling|punctuation|phrasing|word_choice|consistency","explanation":""}], "score": 85 }\n\n' +
        'Text:\n"""\n' + text + '\n"""'
      }], { json: true }).then(function(c) {
        try { return JSON.parse(c); } catch(e) { return { corrections: [], score: 0 }; }
      });
    }

    function generateCitation(info, style) {
      return callOpenAI([{ role: 'user', content:
        'Format this source in ' + style.toUpperCase() + ' style: ' + info + '\n' +
        'Return JSON: { "inText": "...", "reference": "..." }'
      }], { json: true }).then(function(c) {
        try { return JSON.parse(c); } catch(e) { return { reference: c, inText: '' }; }
      });
    }

    function generateThesisStructure(topic, degree, dept) {
      return callOpenAI([{ role: 'user', content:
        'Create thesis structure for ' + degree + ' in ' + (dept||'General') + '.\nTopic: "' + topic + '"\n\n' +
        'Return JSON: { "structure": [{"title":"","description":"","wordCount":0,"subsections":[]}], "totalWords": 15000 }'
      }], { json: true }).then(function(c) {
        try { return JSON.parse(c); } catch(e) { return { structure: [], totalWords: 0 }; }
      });
    }

    function expandSection(title, desc, topic, notes) {
      return callOpenAI([
        { role: 'system', content: 'Help write a thesis section. Topic: ' + topic + '. Use [CITATION NEEDED] where sources are needed. Never fabricate facts.' },
        { role: 'user', content: 'Write content for "' + title + '".\nGuidance: ' + desc + '\nStudent notes: ' + (notes||'Cover subsections thoroughly.') }
      ], { temperature: 0.5 });
    }

    // ============ EXPORT TO WORD ============
    function exportToWord() {
      if (!state.thesisSections.length) return;
      var Document = docx.Document;
      var Packer = docx.Packer;
      var Paragraph = docx.Paragraph;
      var TextRun = docx.TextRun;
      var HeadingLevel = docx.HeadingLevel;
      var PageBreak = docx.PageBreak;

      var children = [];
      state.thesisSections.forEach(function(sec, idx) {
        children.push(new Paragraph({
          heading: HeadingLevel.HEADING_1,
          children: [new TextRun({ text: sec.title, bold: true, size: 28, font: 'Times New Roman' })],
        }));
        sec.subsections.forEach(function(sub) {
          children.push(new Paragraph({
            heading: HeadingLevel.HEADING_2,
            children: [new TextRun({ text: sub, bold: true, size: 24, font: 'Times New Roman' })],
          }));
        });
        if (sec.content) {
          sec.content.split('\n\n').filter(Boolean).forEach(function(para) {
            var t = para.trim();
            if (!t) return;
            if (t.startsWith('##') || t.startsWith('# ')) {
              children.push(new Paragraph({
                heading: HeadingLevel.HEADING_2,
                spacing: { before: 200, after: 100 },
                children: [new TextRun({ text: t.replace(/^#+\s*/, '').replace(/\*\*/g, ''), bold: true, size: 24, font: 'Times New Roman' })],
              }));
            } else {
              children.push(new Paragraph({
                spacing: { after: 120, line: 360 },
                children: [new TextRun({ text: t, size: 24, font: 'Times New Roman' })],
              }));
            }
          });
        }
        if (idx < state.thesisSections.length - 1) {
          children.push(new Paragraph({ children: [new PageBreak()] }));
        }
      });

      var doc = new Document({ sections: [{ properties: {}, children: children }] });
      Packer.toBlob(doc).then(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = state.thesisTopic.replace(/[^a-z0-9]/gi, '_').substring(0, 30) + '_thesis.docx';
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    // ============ SAVE ============
    function saveSettings() {
      localStorage.setItem('awa-api-key', state.apiKey);
      localStorage.setItem('awa-citation', state.citationStyle);
    }
    function saveBiblio() {
      localStorage.setItem('awa-biblio', JSON.stringify(state.bibliography));
    }

    // ============ ACTIONS ============
    function doAnalyze() {
      if (!state.apiKey) { state.writingError = 'Add your API key in Settings first'; render(); return; }
      if (!state.writingText.trim()) { state.writingError = 'Enter some text to analyze'; render(); return; }
      state.writingLoading = true; state.writingError = ''; state.suggestions = []; state.selectedSuggestion = null; render();
      analyzeWriting(state.writingText, state.writingContext).then(function(s) {
        state.suggestions = s; state.writingLoading = false; render();
      }).catch(function(e) { state.writingError = e.message; state.writingLoading = false; render(); });
    }

    function doGenerateCitation() {
      if (!state.apiKey) { state.citationError = 'Add API key in Settings'; render(); return; }
      if (!state.citationSource.trim()) { state.citationError = 'Enter source info'; render(); return; }
      state.citationLoading = true; state.citationError = ''; state.lastCitation = null; render();
      generateCitation(state.citationSource, state.citationStyleSelect).then(function(c) {
        state.lastCitation = c; state.citationLoading = false; render();
      }).catch(function(e) { state.citationError = e.message; state.citationLoading = false; render(); });
    }

    function addToBiblio() {
      if (!state.lastCitation) return;
      state.bibliography.push({
        id: Date.now().toString(),
        source: state.citationSource,
        reference: state.lastCitation.reference,
        inText: state.lastCitation.inText
      });
      saveBiblio();
      state.citationSource = '';
      state.lastCitation = null;
      render();
    }

    function doProofread() {
      if (!state.apiKey) { state.proofError = 'Add API key in Settings'; render(); return; }
      if (!state.proofText.trim()) { state.proofError = 'Enter some text'; render(); return; }
      state.proofLoading = true; state.proofError = ''; state.corrections = []; state.proofScore = 0; state.correctedText = ''; state.selectedCorrection = null; render();
      proofreadText(state.proofText).then(function(r) {
        state.corrections = r.corrections || [];
        state.proofScore = r.score || 0;
        var corrected = state.proofText;
        (r.corrections || []).forEach(function(c) { corrected = corrected.split(c.original).join(c.corrected); });
        state.correctedText = corrected;
        state.proofLoading = false;
        render();
      }).catch(function(e) { state.proofError = e.message; state.proofLoading = false; render(); });
    }

    function doGenerateStructure() {
      if (!state.apiKey) { state.thesisError = 'Add API key in Settings'; render(); return; }
      if (!state.thesisTopic || !state.thesisDegree) { state.thesisError = 'Enter topic and degree'; render(); return; }
      state.thesisLoading = true; state.thesisError = ''; render();
      generateThesisStructure(state.thesisTopic, state.thesisDegree, state.thesisDept).then(function(r) {
        state.thesisSections = r.structure.map(function(s, i) {
          return { id: 'section-' + i, title: s.title, description: s.description, wordCount: s.wordCount, subsections: s.subsections, content: '', notes: '', expanded: i === 0 };
        });
        state.thesisTotalWords = r.totalWords;
        state.thesisStep = 'structure';
        state.thesisLoading = false;
        render();
      }).catch(function(e) { state.thesisError = e.message; state.thesisLoading = false; render(); });
    }

    function doExpandSection(id) {
      var sec = state.thesisSections.find(function(s) { return s.id === id; });
      if (!sec || !state.apiKey) return;
      state.currentGenSection = id; render();
      expandSection(sec.title, sec.description, state.thesisTopic, sec.notes).then(function(content) {
        state.thesisSections = state.thesisSections.map(function(s) { return s.id === id ? Object.assign({}, s, { content: content, expanded: true }) : s; });
        state.currentGenSection = null; render();
      }).catch(function(e) { state.thesisError = e.message; state.currentGenSection = null; render(); });
    }

    function toggleThesisSection(id) {
      state.thesisSections = state.thesisSections.map(function(s) { return s.id === id ? Object.assign({}, s, { expanded: !s.expanded }) : s; });
      render();
    }
    function updateSectionNotes(id, val) {
      state.thesisSections = state.thesisSections.map(function(s) { return s.id === id ? Object.assign({}, s, { notes: val }) : s; });
    }
    function updateSectionContent(id, val) {
      state.thesisSections = state.thesisSections.map(function(s) { return s.id === id ? Object.assign({}, s, { content: val }) : s; });
    }
    function addCustomSection() {
      state.thesisSections.push({ id: 'custom-' + Date.now(), title: 'New Section', description: 'Custom section', wordCount: 1000, subsections: [], content: '', notes: '', expanded: true });
      render();
    }
    function saveAllSettings() {
      saveSettings();
      state.settingsSaved = true;
      setTimeout(function() { state.settingsSaved = false; render(); }, 3000);
      render();
    }
    function removeBiblioItem(id) {
      state.bibliography = state.bibliography.filter(function(x) { return x.id !== id; });
      saveBiblio(); render();
    }
    function toggleSidebar() { state.sidebarCollapsed = !state.sidebarCollapsed; render(); }
    function setTool(id) {
      state.activeTool = id;

    function renderCitation() {

      ['Bachelor','Master','PhD','MPhil','MRes'].forEach(function(d) { h += '<option value="' + d + '"' + (state.thesisDegree===d?' selected':'') + '>' + d + '</option>'; });
      h += '</select></div>';
      h += '<div><label class="block text-sm font-medium mb-2">Department / Field</label>';
      h += '<input type="text" id="tdept" value="' + escHtml(state.thesisDept) + '" placeholder="e.g., Psychology" class="w-full px-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600"></div>';
      h += '</div>';
      h += '<button onclick="doGenerateStructure()" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 flex items-center justify-center gap-2"' + (state.thesisLoading?' disabled':'') + '>';
      if (state.thesisLoading) h += '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full spin"></div> Generating...';
      else h += icon('file-text') + ' Generate Thesis Structure';
      h += '</button></div></div>';
      return h;
    }

    function renderThesisEditor() {
      var drafted = state.thesisSections.filter(function(s) { return s.content.length > 0; }).length;
      var total = state.thesisSections.length;
      var pct = total ? Math.round((drafted / total) * 100) : 0;

      var h = '<div class="p-6 max-w-6xl mx-auto fade-in">';
      h += '<div class="flex items-center justify-between mb-6"><div>';
      h += '<h1 class="text-2xl font-bold mb-1">Thesis: ' + escHtml(state.thesisTopic) + '</h1>';
      h += '<p class="text-gray-500">' + escHtml(state.thesisDegree) + ' &middot; ' + escHtml(state.thesisDept || 'General') + '</p></div>';
      h += '<div class="flex items-center gap-3">';
      h += '<button onclick="addCustomSection()" class="px-3 py-2 text-sm border border-gray-200 rounded-lg hover:bg-gray-100 flex items-center gap-2">' + icon('plus') + ' Add Section</button>';
      h += '<button onclick="exportToWord()" class="px-3 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-2">' + icon('download') + ' Export to Word</button>';
      h += '</div></div>';
      // Progress
      h += '<div class="mb-6 p-4 bg-gray-100 rounded-xl">';
      h += '<div class="flex items-center justify-between text-sm mb-2"><span class="font-medium">Progress</span><span class="text-gray-500">' + drafted + ' / ' + total + ' sections drafted</span></div>';
      h += '<div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full transition-all" style="width:' + pct + '%"></div></div>';
      h += '<p class="text-xs text-gray-400 mt-2">Estimated total: ~' + state.thesisTotalWords.toLocaleString() + ' words</p></div>';
      if (state.thesisError) h += '<div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm flex items-center gap-2">' + icon('alert-circle') + escHtml(state.thesisError) + '</div>';
      // Sections
      h += '<div class="space-y-3">';
      state.thesisSections.forEach(function(sec) {
        h += '<div class="border border-gray-200 rounded-xl bg-white overflow-hidden">';
        h += '<button onclick="toggleThesisSection(\'' + sec.id + '\')" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 transition-colors">';
        h += '<div class="flex items-center gap-3 text-left">' + icon(sec.expanded ? 'chevron-down' : 'chevron-up');
        h += '<div><h3 class="font-medium">' + escHtml(sec.title) + '</h3><p class="text-xs text-gray-500">~' + sec.wordCount.toLocaleString() + ' words</p></div></div>';
        h += '<div>' + (sec.content ? '<span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">Drafted</span>' : '<span class="text-xs px-2 py-1 bg-gray-100 text-gray-400 rounded-full">Empty</span>') + '</div>';
        h += '</button>';
        if (sec.expanded) {
          h += '<div class="p-4 border-t border-gray-200 space-y-4 fade-in">';
          h += '<div><p class="text-xs font-medium text-gray-400 mb-1">What this section covers:</p><p class="text-sm text-gray-500">' + escHtml(sec.description) + '</p></div>';
          if (sec.subsections.length) {
            h += '<div><p class="text-xs font-medium text-gray-400 mb-2">Subsections:</p><div class="flex flex-wrap gap-2">';
            sec.subsections.forEach(function(s) { h += '<span class="text-xs px-2 py-1 bg-gray-100 rounded">' + escHtml(s) + '</span>'; });
            h += '</div></div>';
          }
          h += '<div><label class="text-xs font-medium text-gray-400 mb-1 block">Your Notes & Arguments:</label>';
          h += '<textarea oninput="updateSectionNotes(\'' + sec.id + '\',this.value)" placeholder="Add your key points..." class="w-full h-24 p-3 border border-gray-200 rounded-lg bg-gray-50 resize-none text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">' + escHtml(sec.notes || '') + '</textarea></div>';
          h += '<div><div class="flex items-center justify-between mb-2"><label class="text-xs font-medium text-gray-400">Section Content:</label>';
          h += '<button onclick="doExpandSection(\'' + sec.id + '\')" class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-1"' + (state.currentGenSection===sec.id?' disabled':'') + '>';
          if (state.currentGenSection===sec.id) h += '<div class="w-3 h-3 border-2 border-white border-t-transparent rounded-full spin"></div> Generating...';
          else h += icon('sparkles', 12) + ' ' + (sec.content ? 'Regenerate' : 'Generate');
          h += '</button></div>';
          h += '<textarea oninput="updateSectionContent(\'' + sec.id + '\',this.value)" placeholder="Generated content appears here, or write manually..." class="w-full h-48 p-3 border border-gray-200 rounded-lg bg-gray-50 resize-none text-sm leading-relaxed focus:outline-none focus:ring-2 focus:ring-blue-600">' + escHtml(sec.content || '') + '</textarea>';
          h += '<p class="text-xs text-gray-400 mt-1">' + (sec.content||'').split(/\s+/).filter(Boolean).length + ' words</p></div>';
          h += '</div>';
        }
        h += '</div>';
      });
      h += '</div></div>';
      return h;
    }

    function renderSettings() {
      var h = '<div class="p-6 max-w-4xl mx-auto fade-in">';
      h += '<div class="mb-6"><h1 class="text-2xl font-bold mb-1">Settings</h1><p class="text-gray-500">Configure your API key and citation preferences</p></div>';
      if (state.settingsSaved) h += '<div class="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm flex items-center gap-2">' + icon('check-circle', 16) + ' Settings saved!</div>';
      // API Key
      h += '<div class="space-y-6">';
      h += '<div class="p-6 bg-white border border-gray-200 rounded-xl">';
      h += '<div class="flex items-center gap-3 mb-4"><div class="p-2 bg-blue-100 rounded-lg">' + icon('key') + '</div><div><h2 class="font-semibold">OpenAI API Key</h2><p class="text-xs text-gray-500">Stored in your browser only</p></div></div>';
      h += '<div class="relative">';
      h += '<input type="' + (state.showApiKey ? 'text' : 'password') + '" id="apikey" value="' + escHtml(state.apiKey) + '" placeholder="sk-..." class="w-full px-3 py-2 pr-20 border border-gray-200 rounded-lg bg-gray-50 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-600">';
      h += '<button onclick="state.showApiKey=!state.showApiKey;render()" class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-gray-500 hover:text-gray-900 px-2 py-1">' + (state.showApiKey ? 'Hide' : 'Show') + '</button>';
      h += '</div>';
      h += '<div class="mt-3 p-3 bg-gray-100 rounded-lg text-xs text-gray-500 space-y-1">';
      h += '<p class="font-medium text-gray-900">How to get an API key:</p>';
      h += '<ol class="list-decimal list-inside space-y-1"><li>Go to <a href="https://platform.openai.com/api-keys" target="_blank" class="text-blue-600 underline">platform.openai.com/api-keys</a></li><li>Sign in or create an account</li><li>Click "Create new secret key"</li><li>Copy and paste it here</li></ol></div></div>';
      // Citation Style
      h += '<div class="p-6 bg-white border border-gray-200 rounded-xl">';
      h += '<div class="flex items-center gap-3 mb-4"><div class="p-2 bg-violet-100 rounded-lg">' + icon('quote') + '</div><div><h2 class="font-semibold">Default Citation Style</h2><p class="text-xs text-gray-500">Used in Citation Generator and Thesis Export</p></div></div>';
      h += '<div class="grid grid-cols-1 md:grid-cols-2 gap-3">';
      Object.keys(CITATION_STYLES).forEach(function(k) {
        var v = CITATION_STYLES[k];
        var active = state.citationStyle === k;
        h += '<button onclick="state.citationStyle=\'' + k + '\';render()" class="p-3 rounded-lg border text-left transition-all ' + (active ? 'border-blue-600 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:border-blue-300') + '">';
        h += '<p class="text-sm font-medium">' + v.name + '</p>';
        h += '<p class="text-xs text-gray-400 mt-1">In-text: ' + escHtml(v.inText) + '</p></button>';
      });
      h += '</div></div>';
      h += '<button onclick="saveAllSettings()" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 flex items-center justify-center gap-2">' + icon('save') + ' Save Settings</button>';
      h += '</div></div>';
      return h;
    }

    // ============ READ INPUTS ON RENDER ============
    function syncInputs() {
      var els = {
        wtext: function(v) { state.writingText = v; },
        wctx: function(v) { state.writingContext = v; },
        csrc: function(v) { state.citationSource = v; },
        cstyle: function(v) { state.citationStyleSelect = v; },
        ptext: function(v) { state.proofText = v; },
        ttopic: function(v) { state.thesisTopic = v; },
        tdegree: function(v) { state.thesisDegree = v; },
        tdept: function(v) { state.thesisDept = v; },
        apikey: function(v) { state.apiKey = v; },
      };
      Object.keys(els).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', function() { els[id](el.value); });
          // For select, also fire on change
          if (el.tagName === 'SELECT') el.addEventListener('change', function() { els[id](el.value); });
        }
      });
    }

    // ============ INIT ============
    render();
    syncInputs();
  </script>
</body>
</html>
